<!DOCTYPE html>
<html lang="en">
<head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="../style.css">
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
        <title>Ulalam</title>
</head>
<body>
        <div class="edit-ulam-page">
                <header>
                        <a id="go-back-button"><span class="material-symbols-outlined">arrow_back</span></a>
                </header>

                <form>
                        <label>Name ng ulam</label>
                        <br>
                        <input type="text" id="ulam-name" required>
                        <br>
                        <label>Ingredients</label>
                        <br>
                        <textarea rows="5" id="ingredients" required placeholder="Sibuyas 
bawang"></textarea>
                        <br>
                        <label>Instructions</label>
                        <br>
                        <textarea rows="5" id="steps" required placeholder="Hiwa mga rekados
Gisa ng bawang sibuyas"></textarea>
                        <br>
                        <button class="delete-ulam-button" id="delete-ulam-button"><span class="material-symbols-outlined">delete</span></button>
                        <button class="add-ulam-button" type="submit">SAVE</button>
                </form>
        </div>

        <script type="module" src="../src/script.js"></script>
        <script type="module" src="../src/utils.js"></script>
        <script type="module" src="../src/ulam/edit_ulam.js"></script>
</body>
</html>
